name: Build x86_64 OpenWrt PVE (Cache)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: openwrtYB1.config
  DIY_P1_SH: diyyb1-part1.sh
  DIY_P2_SH: diyyb1-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false 

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends -y \
            build-essential ccache cmake curl git wget unzip xz-utils rsync \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            bzip2 cpio device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib gperf haveged help2man intltool \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
            qemu-utils scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl vim \
            xmlto xxd zlib1g-dev python3-setuptools scdoc clang llvm dwarves golang-go
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

      - name: Clone source code
        run: git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

      # ================= 新增：装载 ccache 编译缓存 =================
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-
      # ==============================================================

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          sed -i 's/\r$//' $DIY_P1_SH
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          sed -i 's/\r$//' openwrt/.config
          sed -i 's/\r$//' $DIY_P2_SH
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          # 核心提速指令：强行开启 OpenWrt 源码的 ccache 支持
          echo "CONFIG_CCACHE=y" >> .config

      - name: Download package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        run: |
          cd openwrt
          # 指定 ccache 工作目录，确保命中缓存
          export CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/.ccache
          mkdir -p $CCACHE_DIR
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          DEVICE_NAME="generic"
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          echo "=== 查找编译产物目录 ==="
          cd openwrt/bin/targets/x86/64
          
          echo "=== 当前目录内容（调试）==="
          ls -la
          
          echo "=== 提取指定固件并清理其余冗余 ==="
          mkdir -p release_tmp
          
          # 改进匹配（兼容自定义 IMG_PREFIX）
          shopt -s nullglob
          mv *squashfs-combined-efi.img.gz release_tmp/ 2>/dev/null || true
          mv sha256sums release_tmp/ 2>/dev/null || true
          
          # 安全清理：只删除除 release_tmp 以外的所有文件/文件夹
          shopt -s extglob
          rm -rf !(release_tmp)
          
          # 移动回当前目录
          mv release_tmp/* ./ 2>/dev/null || true
          rm -rf release_tmp
          
          # 最终检查
          if [ -z "$(ls -A *.img.gz 2>/dev/null)" ]; then
            echo "警告: 未找到 squashfs-combined-efi.img.gz 固件文件！"
            echo "当前目录实际内容："
            ls -la
            exit 1
          fi
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt-PVE-N6000_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: error

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 8
