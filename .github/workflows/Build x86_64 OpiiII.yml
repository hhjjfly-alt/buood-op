name: Build x86_64 OpenWrt yuanban

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: openwrtYB.config
  DIY_P1_SH: diyyb-part1.sh
  DIY_P2_SH: diyyb-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 仅保留这一个最强大、最稳定的磁盘空间扩展插件，提供约 101GB 的编译空间
      - name: Freeing up disk space (maximize build space first)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 20480
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout
        uses: actions/checkout@main

      - name: Prepare apt directories on build volume
        run: |
          sudo mkdir -p ${{ github.workspace }}/.apt-cache/archives
          sudo mkdir -p ${{ github.workspace }}/.apt-cache/lists
          sudo chmod -R 777 ${{ github.workspace }}/.apt-cache
          sudo cp /etc/apt/apt.conf.d/99custom /etc/apt/apt.conf.d/99custom.bak 2>/dev/null || true
          echo 'Dir::Cache::Archives "${{ github.workspace }}/.apt-cache/archives";' | sudo tee /etc/apt/apt.conf.d/99custom
          echo 'Dir::State::Lists "${{ github.workspace }}/.apt-cache/lists";' | sudo tee -a /etc/apt/apt.conf.d/99custom
          echo 'Acquire::Retries "3";' | sudo tee -a /etc/apt/apt.conf.d/99custom
          sudo rm -rf /var/cache/apt/archives
          sudo ln -s ${{ github.workspace }}/.apt-cache/archives /var/cache/apt/archives
          sudo apt-get clean

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          echo "Installing basic tools..."
          sudo -E apt-get -qq install --no-install-recommends -y \
            build-essential ccache cmake curl git wget unzip xz-utils
          echo "Installing build dependencies..."
          sudo -E apt-get -qq install --no-install-recommends -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            bzip2 cpio device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib gperf haveged help2man intltool \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
            python3-pyelftools libpython3-dev qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl vim \
            xmlto xxd zlib1g-dev python3-setuptools
          echo "Installing additional tools..."
          sudo -E apt-get -qq install --no-install-recommends -y scdoc || true
          # 安装 clang llvm 和 dwarves，为 BPF 和 BTF 编译提供底层支撑
          sudo -E apt-get -qq install --no-install-recommends -y clang llvm dwarves
          sudo -E apt-get -qq install --no-install-recommends -y golang-go
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc \
            /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
            /usr/local/share/powershell /usr/local/share/chromium \
            /usr/local/lib/node_modules
          sudo timedatectl set-timezone "$TZ"
          sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

      - name: Clone source code
        working-directory: ./
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          sed -i 's/\r$//' $DIY_P1_SH
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          sed -i 's/\r$//' openwrt/.config
          sed -i 's/\r$//' $DIY_P2_SH
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "=== 初始架构配置 ==="
          grep -E "^CONFIG_TARGET" .config | head -10

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          echo "=== 目标设备 ==="
          grep "^CONFIG_TARGET.*DEVICE.*=y" .config || echo "使用默认 generic 设备"
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Clean build environment
        run: |
          cd openwrt
          make clean
          echo "Build environment cleaned."

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          DEVICE_NAME=$(grep "^CONFIG_TARGET.*DEVICE.*=y" .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
          if [ -z "$DEVICE_NAME" ]; then
            DEVICE_NAME="generic"
          fi
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "编译完成的设备: $DEVICE_NAME"

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          echo "=== 查找编译产物目录 ==="
          find openwrt/bin -type d -name "targets" 2>/dev/null || echo "未找到 targets 目录"
          ls -la openwrt/bin/ 2>/dev/null || echo "bin 目录不存在"
          cd openwrt/bin/targets/*/*/
          rm -rf packages
          find . -type f -not \( -name "*.img.gz" -o -name "*.iso" -o -name "sha256sums" -o -name "*.manifest" \) -exec rm -f {} \;
          
          if [ -z "$(ls -A *.img.gz 2>/dev/null)" ]; then
            echo "警告: 未找到 .img.gz 固件文件！"
            ls -lah
            exit 1
          fi
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: error

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 8

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.1.0
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

